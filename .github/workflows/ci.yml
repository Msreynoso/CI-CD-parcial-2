name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── 1. TESTS AUTOMATIZADOS ─────────────────────────────────────────────────
  test:
    name: Pruebas automatizadas
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        id: pytest
        run: |
          pytest tests/ -v 2>&1 | tee pytest_output.txt
          exit ${PIPESTATUS[0]}

      - name: Guardar resumen de errores
        if: failure()
        run: |
          # Extrae solo las líneas de FAILED y los mensajes de error
          grep -E "FAILED|AssertionError|Error|assert" pytest_output.txt \
            | head -20 > pytest_errors.txt || true

      - name: Subir reporte de errores
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-errors
          path: pytest_errors.txt

      - name: Exportar errores como variable de entorno
        if: failure()
        run: |
          ERRORS=$(grep -E "FAILED|AssertionError|assert" pytest_output.txt \
            | head -10 | tr '\n' ' | ' || echo "Ver logs para más detalles")
          echo "PYTEST_ERRORS=$ERRORS" >> $GITHUB_ENV

  # ── 2. BUILD Y PUSH DOCKER ────────────────────────────────────────────────
  build:
    name: Build y push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/parcial-cicd:latest

  # ── 3. DEPLOY A VERCEL ────────────────────────────────────────────────────
  deploy:
    name: Deploy a Vercel
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push'

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Deploy a Vercel
        run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes

  # ── 4. NOTIFICACIÓN SLACK — ÉXITO ─────────────────────────────────────────
  notify_success:
    name: Notificar éxito
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: success()

    steps:
      - name: Enviar mensaje a Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Pipeline exitoso*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Pipeline exitoso* en `${{ github.repository }}`\n*Rama:* `${{ github.ref_name }}`\n*Commit:* ${{ github.event.head_commit.message }}\n*Autor:* ${{ github.actor }}\n*Ver:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver pipeline>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── 5. NOTIFICACIÓN SLACK — FALLO ─────────────────────────────────────────
  notify_failure:
    name: Notificar fallo
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: failure()

    steps:
      - name: Obtener errores de pytest
        id: get_errors
        run: |
          echo "PYTEST_ERRORS=${{ env.PYTEST_ERRORS }}" >> $GITHUB_ENV

      - name: Enviar mensaje a Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Pipeline fallido*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Pipeline fallido* en `${{ github.repository }}`\n*Rama:* `${{ github.ref_name }}`\n*Commit:* ${{ github.event.head_commit.message }}\n*Autor:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Tests fallidos:*\n```${{ env.PYTEST_ERRORS }}```"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Ver error completo:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver pipeline>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
