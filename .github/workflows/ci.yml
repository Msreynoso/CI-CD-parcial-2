name: CI/CD Calculadora

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── 1. TESTS AUTOMATIZADOS ──────────────────────────────────────────────────
  test:
    name: Pruebas automatizadas
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests con pytest
        run: pytest calculadora_app/tests/ -v

  # ── 2. BUILD Y PUSH DE IMAGEN DOCKER ───────────────────────────────────────
  build:
    name: Build y push Docker
    runs-on: ubuntu-latest
    needs: test          # solo se ejecuta si los tests pasaron

    # Solo en push a main (no en pull requests)
    if: github.event_name == 'push'

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/calculadora:latest
